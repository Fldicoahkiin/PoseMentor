version: "3.9"

services:
  backend-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python", "backend_api.py"]
    ports:
      - "8787:8787"
    volumes:
      - ../data:/app/data
      - ../artifacts:/app/artifacts
      - ../outputs:/app/outputs
      - ../configs:/app/configs
    environment:
      - PYTHONUNBUFFERED=1

  admin-console:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python", "admin_console.py", "--api", "http://backend-api:8787", "--host", "0.0.0.0", "--port", "7861"]
    ports:
      - "7861:7861"
    depends_on:
      - backend-api
    volumes:
      - ../data:/app/data
      - ../artifacts:/app/artifacts
      - ../outputs:/app/outputs
      - ../configs:/app/configs

  posementor-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python", "app_demo.py", "--host", "0.0.0.0", "--port", "7860"]
    ports:
      - "7860:7860"
    depends_on:
      - backend-api
    volumes:
      - ../data:/app/data
      - ../artifacts:/app/artifacts
      - ../outputs:/app/outputs
      - ../configs:/app/configs
