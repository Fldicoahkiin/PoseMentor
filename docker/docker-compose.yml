version: "3.9"

services:
  backend-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python", "backend_api.py", "--host", "0.0.0.0", "--port", "8787"]
    ports:
      - "8787:8787"
    volumes:
      - ../data:/app/data
      - ../artifacts:/app/artifacts
      - ../outputs:/app/outputs
      - ../configs:/app/configs
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    command: >
      sh -lc "corepack enable &&
              pnpm install &&
              pnpm dev --host 0.0.0.0 --port 7860"
    ports:
      - "7860:7860"
    depends_on:
      - backend-api
    volumes:
      - ../frontend:/app/frontend
      - ../outputs:/app/outputs
    environment:
      - VITE_BACKEND_URL=http://backend-api:8787
